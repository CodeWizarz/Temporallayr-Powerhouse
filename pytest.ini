[pytest]
testpaths = tests
pythonpath = src
asyncio_mode = auto
addopts = --strict-markers -m "not external"
junit_family = xunit2
markers =
    unit: fast unit tests for isolated components
    integration: integration tests covering cross-component behavior
    e2e: end-to-end tests spanning full runtime flows
    external: tests requiring external services (docker/testcontainers)
    postgres: tests that exercise PostgreSQL paths
    clickhouse: tests that exercise ClickHouse paths
