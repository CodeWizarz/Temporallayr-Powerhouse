image:
  repository: temporallayr
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: temporallayr.local
      paths:
        - path: /
          pathType: ImplementationSpecific

env:
  TEMPORALLAYR_API_KEY: ""
  TEMPORALLAYR_TENANT_ID: ""
  TEMPORALLAYR_CLICKHOUSE_HOST: ""
  TEMPORALLAYR_OTLP_ENDPOINT: ""
  TEMPORALLAYR_POSTGRES_DSN: ""
  TEMPORALLAYR_ADMIN_KEY: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70
