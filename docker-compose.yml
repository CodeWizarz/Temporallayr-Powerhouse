version: "3.9"

services:
  temporallayr:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      TEMPORALLAYR_API_KEY: ${TEMPORALLAYR_API_KEY:-dev-key-change-me}
      TEMPORALLAYR_ADMIN_KEY: ${TEMPORALLAYR_ADMIN_KEY:-admin-key-change-me}
      TEMPORALLAYR_TENANT_ID: ${TEMPORALLAYR_TENANT_ID:-default}
      TEMPORALLAYR_API_KEYS: ${TEMPORALLAYR_API_KEYS:-dev-key-change-me=default}
      TEMPORALLAYR_DATA_DIR: /data/.temporallayr
      TEMPORALLAYR_CLICKHOUSE_HOST: ${TEMPORALLAYR_CLICKHOUSE_HOST:-clickhouse}
      TEMPORALLAYR_CLICKHOUSE_PORT: ${TEMPORALLAYR_CLICKHOUSE_PORT:-8123}
      TEMPORALLAYR_CLICKHOUSE_SECURE: ${TEMPORALLAYR_CLICKHOUSE_SECURE:-false}
      TEMPORALLAYR_CLICKHOUSE_USER: ${TEMPORALLAYR_CLICKHOUSE_USER:-default}
      TEMPORALLAYR_CLICKHOUSE_PASSWORD: ${TEMPORALLAYR_CLICKHOUSE_PASSWORD:-}
      TEMPORALLAYR_POSTGRES_DSN: ${TEMPORALLAYR_POSTGRES_DSN:-postgresql://temporallayr:temporallayr@postgres:5432/temporallayr}
      TEMPORALLAYR_OTLP_ENDPOINT: ${TEMPORALLAYR_OTLP_ENDPOINT:-}
      TEMPORALLAYR_LOG_LEVEL: ${TEMPORALLAYR_LOG_LEVEL:-INFO}
    volumes:
      - temporallayr_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - temporallayr
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    profiles: ["local-clickhouse"]
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: temporallayr
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["local-postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: temporallayr
      POSTGRES_USER: temporallayr
      POSTGRES_PASSWORD: temporallayr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporallayr -d temporallayr"]
      interval: 10s
      timeout: 5s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    profiles: ["phoenix"]
    ports:
      - "6006:6006"
      - "4317:4317"
    volumes:
      - phoenix_data:/phoenix
    restart: unless-stopped

volumes:
  temporallayr_data:
  clickhouse_data:
  postgres_data:
  phoenix_data:
