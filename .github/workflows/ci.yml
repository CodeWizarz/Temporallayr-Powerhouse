name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install ruff black

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Black check
        run: black --check src/ tests/

  # ── Type check ─────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy src/temporallayr/models/ src/temporallayr/config.py src/temporallayr/exceptions.py

  # ── Unit tests ─────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=temporallayr \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          TEMPORALLAYR_TENANT_ID: ci-tenant
          TEMPORALLAYR_API_KEY: ci-test-key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Integration test (server smoke test) ───────────────────────────
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Seed API key
        run: |
          python -c "
          from temporallayr.server.auth.api_keys import map_api_key_to_tenant
          map_api_key_to_tenant('ci-test-key', 'ci-tenant')
          print('Key seeded.')
          "

      - name: Start server
        run: |
          uvicorn temporallayr.server.app:app --host 0.0.0.0 --port 8765 &
          echo $! > server.pid
          sleep 3
        env:
          TEMPORALLAYR_API_KEY: ci-test-key
          TEMPORALLAYR_TENANT_ID: ci-tenant

      - name: Health check
        run: |
          curl -sf http://localhost:8765/health
          curl -sf http://localhost:8765/ready

      - name: Ingest test event
        run: |
          curl -sf -X POST http://localhost:8765/v1/ingest \
            -H "Content-Type: application/json" \
            -H "X-Tenant-Id: ci-tenant" \
            -d '{"events": [{"tenant_id": "ci-tenant", "spans": []}]}'

      - name: Run example agent
        run: python example_agent.py
        env:
          TEMPORALLAYR_SERVER_URL: http://localhost:8765
          TEMPORALLAYR_API_KEY: ci-test-key
          TEMPORALLAYR_TENANT_ID: ci-tenant

      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true

  # ── Docker build ───────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t temporallayr:ci .

      - name: Smoke test container
        run: |
          docker run -d \
            -e TEMPORALLAYR_API_KEY=ci-test-key \
            -e TEMPORALLAYR_TENANT_ID=ci-tenant \
            -p 8766:8000 \
            --name tl-ci \
            temporallayr:ci
          sleep 5
          curl -sf http://localhost:8766/health
          docker stop tl-ci

  # ── Security scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --requirement <(pip install -e . --dry-run 2>&1 | grep "Would install" | tr ' ' '\n' | grep "==" | sed 's/.*://') || true

  # ── Publish (on tag) ───────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build
        run: |
          pip install hatchling
          python -m hatchling build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
