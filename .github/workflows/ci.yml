name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all,dev]"
    - name: Run unit tests
      run: pytest tests/unit/ -v --tb=short
    - name: Run integration tests (no external services)
      run: pytest tests/integration/ -v --tb=short -k "not postgres and not clickhouse"
    - name: Run server route tests
      run: pytest tests/test_server_routes.py tests/test_decorators.py -v --tb=short
