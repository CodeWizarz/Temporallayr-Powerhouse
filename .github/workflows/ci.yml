name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-and-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install -e ".[dev]"
          pip install coverage

      - name: Prepare CI environment
        run: bash .github/scripts/ci-prepare.sh

      - name: Lint with Ruff
        run: python -m ruff check --show-source .

      - name: Check formatting with Black
        run: python -m black --check .

      - name: Type-check with mypy
        run: python -m mypy src

      - name: Run tests (JUnit)
        run: python -m pytest -q --maxfail=1 --junitxml="$JUNIT_XML"

      - name: Coverage gate (>=80%)
        run: |
          python -m coverage run --rcfile="${COVERAGE_RCFILE}" -m pytest
          python -m coverage xml --rcfile="${COVERAGE_RCFILE}" -o "$COVERAGE_XML"
          python -m coverage report --rcfile="${COVERAGE_RCFILE}" --fail-under=80

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            reports/junit.xml
            reports/coverage.xml
            .coverage
          if-no-files-found: warn

      - name: Upload coverage to Codecov (optional)
        if: always() && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false
          verbose: true
